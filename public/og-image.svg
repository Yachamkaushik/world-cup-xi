<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#F5C518" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#F5C518" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- top eyebrow line -->
  <rect x="540" y="195" width="40" height="2" fill="#F5C518" opacity="0.6"/>
  <text x="600" y="197" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900" fill="#F5C518" text-anchor="middle" letter-spacing="4" opacity="0.8">THE ULTIMATE FOOTBALL DRAFT</text>
  <rect x="820" y="195" width="40" height="2" fill="#F5C518" opacity="0.6"/>

  <!-- main title -->
  <text x="600" y="300" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">THE WORLD</text>
  <text x="600" y="400" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="#F5C518" text-anchor="middle" letter-spacing="-2">CUP XI.</text>

  <!-- tagline -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="22" fill="#6b7280" text-anchor="middle">Draft legends. Build your XI. Win the impossible.</text>

  <!-- url -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="16" fill="#374151" text-anchor="middle" letter-spacing="2">world-cup-xi-one.vercel.app</text>
</svg>
